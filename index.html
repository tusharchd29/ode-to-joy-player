<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Faded · Tushar</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 32px 28px 24px;
      text-align: center;
      width: 100%;
      max-width: 340px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .note-icon { font-size:44px; margin-bottom:10px; display:block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    h1 { color:#fff; font-size:21px; font-weight:700; margin-bottom:3px; }
    .artist { color:rgba(255,255,255,0.4); font-size:13px; margin-bottom:18px; }

    /* ── Lyrics ── */
    .lyrics-box {
      height: 130px;
      overflow-y: scroll;
      overflow-x: hidden;
      margin-bottom: 18px;
      position: relative;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      /* Hide scrollbar but keep scroll */
      scrollbar-width: none;
    }
    .lyrics-box::-webkit-scrollbar { display: none; }
    /* fade edges */
    .lyrics-outer {
      position: relative;
      margin-bottom: 18px;
    }
    .lyrics-outer::before, .lyrics-outer::after {
      content:''; position:absolute; left:0; right:0; height:28px; z-index:2; pointer-events:none;
    }
    .lyrics-outer::before { top:0; background: linear-gradient(to bottom, rgba(18,22,46,0.95), transparent); }
    .lyrics-outer::after  { bottom:0; background: linear-gradient(to top, rgba(18,22,46,0.95), transparent); }

    .lyric-line {
      font-size: 13px;
      line-height: 1.85;
      padding: 3px 4px;
      color: rgba(255,255,255,0.22);
      transition: color 0.35s, font-size 0.35s, font-weight 0.35s;
      cursor: default;
    }
    .lyric-line.near  { color: rgba(255,255,255,0.5); }
    .lyric-line.active {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }

    /* ── Play button ── */
    .btn-play {
      width:64px; height:64px; border-radius:50%; border:none;
      background: linear-gradient(135deg, #7b5af5, #e855a0);
      cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
      box-shadow: 0 0 28px rgba(123,90,245,0.5);
      transition: transform 0.12s;
      margin-bottom: 22px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-play:active { transform:scale(0.91); }

    /* ── Seek ── */
    .seek-wrap { margin-bottom:6px; }
    .bar-row {
      width:100%; height:10px;
      background: rgba(255,255,255,0.12);
      border-radius:99px; position:relative; cursor:pointer;
      touch-action: none;
    }
    .bar-fill {
      height:100%; width:0%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius:99px; pointer-events:none;
    }
    .bar-thumb {
      width:20px; height:20px; border-radius:50%;
      background:#fff;
      box-shadow: 0 0 8px rgba(123,90,245,0.9);
      position:absolute; top:50%; transform:translate(-50%,-50%);
      left:0%; pointer-events:none;
    }
    .times { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.28); margin-top:5px; }

    /* ── Volume ── */
    .vol-wrap { display:flex; align-items:center; gap:10px; margin-top:14px; }
    .vol-icon { color:rgba(255,255,255,0.38); font-size:15px; flex-shrink:0; }

    .status { font-size:12px; color:rgba(255,255,255,0.35); margin-top:12px; min-height:16px; }
    .status.playing { color:#a78bfa; }
  </style>
</head>
<body>
<div class="card">
  <span class="note-icon">🎵</span>
  <h1>Faded</h1>
  <div class="artist">Tushar</div>

  <div class="lyrics-outer">
    <div class="lyrics-box" id="lyricsBox">
      <div style="height:52px"></div>
      <!-- lines injected by JS -->
      <div style="height:52px"></div>
    </div>
  </div>

  <button class="btn-play" onclick="togglePlay()">
    <svg id="ico-play" width="26" height="26" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="ico-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <div class="seek-wrap">
    <div class="bar-row" id="seekTrack">
      <div class="bar-fill"  id="seekFill"></div>
      <div class="bar-thumb" id="seekThumb"></div>
    </div>
    <div class="times"><span id="cur">0:00</span><span id="dur">--:--</span></div>
  </div>

  <div class="vol-wrap">
    <span class="vol-icon">🔈</span>
    <div class="bar-row" id="volTrack" style="height:10px">
      <div class="bar-fill"  id="volFill"  style="width:90%"></div>
      <div class="bar-thumb" id="volThumb" style="left:90%"></div>
    </div>
    <span class="vol-icon">🔊</span>
  </div>

  <div class="status" id="status">Tap play to start</div>
</div>

<audio id="audio"
  src="https://raw.githubusercontent.com/tusharchd29/tushar/main/faded.mp3"
  preload="auto"></audio>

<script>
// ── Lyrics timed to Faded (Alan Walker) ~3:38 ──────────────
// Timestamps calibrated to standard version
const lyrics = [
  { t:  0.0, text: "♪ Intro ♪" },
  { t: 18.5, text: "A world so cruel" },
  { t: 21.5, text: "Without a place to call home" },
  { t: 25.0, text: "I gave you all" },
  { t: 28.0, text: "But you left me alone" },
  { t: 31.5, text: "You put me high" },
  { t: 34.5, text: "I tumbled and I fell" },
  { t: 38.0, text: "My lessons learned" },
  { t: 41.0, text: "I paid the price to get through hell" },
  { t: 45.0, text: "Where are you now?" },
  { t: 48.0, text: "Was it all in my fantasy?" },
  { t: 51.5, text: "Where are you now?" },
  { t: 54.5, text: "Were you only imaginary?" },
  { t: 58.5, text: "Under the sea" },
  { t: 61.5, text: "Under the sea" },
  { t: 65.0, text: "Where are you now?" },
  { t: 68.0, text: "Another dream" },
  { t: 71.5, text: "The monster's running wild inside of me" },
  { t: 76.5, text: "I'm faded" },
  { t: 80.5, text: "So lost, I'm faded" },
  { t: 84.5, text: "So lost, I'm faded" },
  { t: 90.0, text: "♪ ♪ ♪" },
  { t: 99.0, text: "These shallow waters" },
  { t: 102.5, text: "Never met what I needed" },
  { t: 106.0, text: "I'm letting go" },
  { t: 109.0, text: "A deeper dive" },
  { t: 112.5, text: "Eternal silence of the sea" },
  { t: 116.5, text: "I'm breathing" },
  { t: 120.0, text: "Alive" },
  { t: 124.5, text: "Where are you now?" },
  { t: 127.5, text: "Was it all in my fantasy?" },
  { t: 131.0, text: "Where are you now?" },
  { t: 134.0, text: "Were you only imaginary?" },
  { t: 137.5, text: "Under the sea" },
  { t: 140.5, text: "Under the sea" },
  { t: 144.0, text: "Where are you now?" },
  { t: 147.0, text: "Another dream" },
  { t: 150.5, text: "The monster's running wild inside of me" },
  { t: 155.5, text: "I'm faded" },
  { t: 159.5, text: "So lost, I'm faded" },
  { t: 163.5, text: "So lost, I'm faded" },
  { t: 169.0, text: "♪ ♪ ♪" },
  { t: 178.0, text: "Where are you now?" },
  { t: 181.0, text: "Another dream" },
  { t: 184.5, text: "The monster's running wild inside of me" },
  { t: 189.5, text: "I'm faded" },
  { t: 193.5, text: "So lost, I'm faded" },
  { t: 197.5, text: "So lost, I'm faded" },
  { t: 203.0, text: "♪ ♪ ♪" },
  { t: 213.0, text: "♪ Outro ♪" },
];

// Build lyric elements
const box = document.getElementById('lyricsBox');
const padTop = box.children[0];
const padBot = box.children[1];
const els = [];

lyrics.forEach((l, i) => {
  const d = document.createElement('div');
  d.className = 'lyric-line';
  d.textContent = l.text;
  box.insertBefore(d, padBot);
  els.push(d);
});

// Allow user to scroll manually; pause auto-scroll for 3s after touch
let userScrolling = false;
let userScrollTimer = null;
box.addEventListener('touchstart', () => {
  userScrolling = true;
  clearTimeout(userScrollTimer);
}, { passive: true });
box.addEventListener('touchend', () => {
  userScrollTimer = setTimeout(() => userScrolling = false, 3000);
}, { passive: true });
box.addEventListener('scroll', () => {
  // If user initiates scroll (not our programmatic scroll), pause auto
  if (!autoScrolling) {
    userScrolling = true;
    clearTimeout(userScrollTimer);
    userScrollTimer = setTimeout(() => userScrolling = false, 3000);
  }
});

let autoScrolling = false;
let lastIdx = -1;

function updateLyrics(t) {
  let idx = 0;
  for (let i = 0; i < lyrics.length; i++) {
    if (t >= lyrics[i].t) idx = i;
    else break;
  }
  if (idx === lastIdx) return;
  lastIdx = idx;

  els.forEach((el, i) => {
    el.classList.remove('active', 'near');
    if (i === idx) el.classList.add('active');
    else if (Math.abs(i - idx) <= 1) el.classList.add('near');
  });

  if (!userScrolling) {
    const activeEl = els[idx];
    const boxH = box.clientHeight;
    const lineTop = activeEl.offsetTop;
    const lineH  = activeEl.offsetHeight;
    const target = lineTop - (boxH / 2) + (lineH / 2);
    autoScrolling = true;
    box.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    setTimeout(() => autoScrolling = false, 600);
  }
}

// ── Audio ────────────────────────────────────────────────────
const audio    = document.getElementById('audio');
const seekFill = document.getElementById('seekFill');
const seekThumb= document.getElementById('seekThumb');
const volFill  = document.getElementById('volFill');
const volThumb = document.getElementById('volThumb');
const curEl    = document.getElementById('cur');
const durEl    = document.getElementById('dur');
const status   = document.getElementById('status');
const iPlay    = document.getElementById('ico-play');
const iPause   = document.getElementById('ico-pause');

audio.volume = 0.9;

function fmt(s) {
  s = Math.max(0, s || 0);
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}
function setBar(fill, thumb, pct) {
  fill.style.width = pct + '%';
  thumb.style.left = pct + '%';
}

audio.addEventListener('loadedmetadata', () => durEl.textContent = fmt(audio.duration));
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  setBar(seekFill, seekThumb, (audio.currentTime / audio.duration) * 100);
  curEl.textContent = fmt(audio.currentTime);
  updateLyrics(audio.currentTime);
});
audio.addEventListener('ended', () => {
  iPlay.style.display=''; iPause.style.display='none';
  status.textContent='Finished'; status.className='status';
  setBar(seekFill, seekThumb, 0); curEl.textContent='0:00';
  lastIdx = -1; box.scrollTo({top:0, behavior:'smooth'});
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    iPlay.style.display='none'; iPause.style.display='';
    status.textContent='▶ Now playing…'; status.className='status playing';
  } else {
    audio.pause();
    iPlay.style.display=''; iPause.style.display='none';
    status.textContent='Paused'; status.className='status';
  }
}

// ── Drag helper (seek + volume) ───────────────────────────────
function makeDraggable(trackEl, onDrag) {
  function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }
  function calc(e) {
    const r = trackEl.getBoundingClientRect();
    return Math.max(0, Math.min(1, (getClientX(e) - r.left) / r.width));
  }
  let active = false;
  trackEl.addEventListener('mousedown',  e => { active=true; onDrag(calc(e)); e.preventDefault(); });
  trackEl.addEventListener('touchstart', e => { active=true; onDrag(calc(e)); }, {passive:true});
  document.addEventListener('mousemove',  e => { if(active){ onDrag(calc(e)); e.preventDefault(); }}, {passive:false});
  document.addEventListener('touchmove',  e => { if(active){ onDrag(calc(e)); e.preventDefault(); }}, {passive:false});
  document.addEventListener('mouseup',  () => active=false);
  document.addEventListener('touchend', () => active=false);
}

makeDraggable(document.getElementById('seekTrack'), pct => {
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
    setBar(seekFill, seekThumb, pct * 100);
    updateLyrics(pct * audio.duration);
  }
});

makeDraggable(document.getElementById('volTrack'), pct => {
  audio.volume = pct;
  setBar(volFill, volThumb, pct * 100);
});
</script>
</body>
</html>
