<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Faded · Tushar</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 36px 32px 28px;
      text-align: center;
      width: 100%;
      max-width: 340px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .note-icon {
      font-size:48px; margin-bottom:12px; display:block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    h1 { color:#fff; font-size:22px; font-weight:700; margin-bottom:4px; }
    .artist { color:rgba(255,255,255,0.45); font-size:13px; margin-bottom:24px; }

    /* Lyrics */
    .lyrics-box {
      height: 64px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    .lyrics-box::before, .lyrics-box::after {
      content:''; position:absolute; left:0; right:0; height:20px; z-index:2; pointer-events:none;
    }
    .lyrics-box::before { top:0; background: linear-gradient(to bottom, rgba(20,25,50,0.9), transparent); }
    .lyrics-box::after  { bottom:0; background: linear-gradient(to top, rgba(20,25,50,0.9), transparent); }
    .lyrics-inner {
      transition: transform 0.6s ease;
    }
    .lyric-line {
      font-size: 13px;
      line-height: 1.7;
      padding: 2px 0;
      color: rgba(255,255,255,0.25);
      transition: color 0.4s, font-size 0.4s, font-weight 0.4s;
    }
    .lyric-line.active {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
    }
    .lyric-line.near {
      color: rgba(255,255,255,0.55);
    }

    /* Play button */
    .btn-play {
      width:68px; height:68px; border-radius:50%; border:none;
      background: linear-gradient(135deg, #7b5af5, #e855a0);
      cursor:pointer; display:inline-flex; align-items:center; justify-content:center;
      box-shadow: 0 0 30px rgba(123,90,245,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 24px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-play:active { transform:scale(0.93); }

    /* Seek bar */
    .seek-wrap { margin-bottom: 8px; touch-action: none; }
    .seek-track {
      width:100%; height:8px;
      background: rgba(255,255,255,0.12);
      border-radius:99px; position:relative; cursor:pointer;
    }
    .seek-fill {
      height:100%; width:0%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius:99px; pointer-events:none;
    }
    .seek-thumb {
      width:18px; height:18px; border-radius:50%;
      background:#fff;
      box-shadow: 0 0 8px rgba(123,90,245,0.9);
      position:absolute; top:50%; transform:translate(-50%,-50%);
      left:0%; pointer-events:none;
    }
    .times {
      display:flex; justify-content:space-between;
      font-size:11px; color:rgba(255,255,255,0.3); margin-top:6px;
    }

    /* Volume */
    .vol-wrap {
      display:flex; align-items:center; gap:10px; margin-top:16px;
    }
    .vol-icon { color:rgba(255,255,255,0.4); font-size:16px; flex-shrink:0; }
    .vol-track {
      flex:1; height:8px;
      background:rgba(255,255,255,0.12);
      border-radius:99px; position:relative; cursor:pointer;
      touch-action: none;
    }
    .vol-fill {
      height:100%; width:90%;
      background: linear-gradient(90deg, #7b5af5, #e855a0);
      border-radius:99px; pointer-events:none;
    }
    .vol-thumb {
      width:18px; height:18px; border-radius:50%;
      background:#fff;
      box-shadow: 0 0 8px rgba(123,90,245,0.9);
      position:absolute; top:50%; transform:translate(-50%,-50%);
      left:90%; pointer-events:none;
    }

    .status { font-size:12px; color:rgba(255,255,255,0.4); margin-top:14px; min-height:16px; }
    .status.playing { color:#a78bfa; }
  </style>
</head>
<body>
<div class="card">
  <span class="note-icon">🎵</span>
  <h1>Faded</h1>
  <div class="artist">Tushar</div>

  <!-- Lyrics -->
  <div class="lyrics-box">
    <div class="lyrics-inner" id="lyricsInner"></div>
  </div>

  <button class="btn-play" id="btnPlay" onclick="togglePlay()">
    <svg id="ico-play" width="26" height="26" viewBox="0 0 24 24" fill="white"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="ico-pause" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none"><rect x="5" y="3" width="5" height="18"/><rect x="14" y="3" width="5" height="18"/></svg>
  </button>

  <!-- Seek -->
  <div class="seek-wrap">
    <div class="seek-track" id="seekTrack">
      <div class="seek-fill"  id="seekFill"></div>
      <div class="seek-thumb" id="seekThumb"></div>
    </div>
    <div class="times">
      <span id="cur">0:00</span>
      <span id="dur">--:--</span>
    </div>
  </div>

  <!-- Volume -->
  <div class="vol-wrap">
    <span class="vol-icon">🔈</span>
    <div class="vol-track" id="volTrack">
      <div class="vol-fill"  id="volFill"></div>
      <div class="vol-thumb" id="volThumb"></div>
    </div>
    <span class="vol-icon">🔊</span>
  </div>

  <div class="status" id="status">Tap play to start</div>
</div>

<audio id="audio"
  src="https://raw.githubusercontent.com/tusharchd29/tushar/main/faded.mp3"
  preload="auto">
</audio>

<script>
const audio    = document.getElementById('audio');
const seekFill = document.getElementById('seekFill');
const seekThumb= document.getElementById('seekThumb');
const seekTrack= document.getElementById('seekTrack');
const volFill  = document.getElementById('volFill');
const volThumb = document.getElementById('volThumb');
const volTrack = document.getElementById('volTrack');
const curEl    = document.getElementById('cur');
const durEl    = document.getElementById('dur');
const status   = document.getElementById('status');
const iPlay    = document.getElementById('ico-play');
const iPause   = document.getElementById('ico-pause');

audio.volume = 0.9;

// ── Lyrics (timed to Faded) ──────────────────────────────────
const lyrics = [
  { t:  0,   text: "♪ ♪ ♪" },
  { t:  7,   text: "A world so cold" },
  { t:  10,  text: "Without a place to call home" },
  { t:  14,  text: "I gave you all" },
  { t:  17,  text: "But you left me alone" },
  { t:  21,  text: "You put me high" },
  { t:  24,  text: "I tumbled and I fell" },
  { t:  28,  text: "My lessons learned" },
  { t:  31,  text: "I paid the price to get through hell" },
  { t:  35,  text: "Where are you now?" },
  { t:  38,  text: "Was it all in my fantasy?" },
  { t:  42,  text: "Where are you now?" },
  { t:  45,  text: "Were you only imaginary?" },
  { t:  50,  text: "Under the sea" },
  { t:  53,  text: "Under the sea" },
  { t:  56,  text: "Where are you now?" },
  { t:  59,  text: "Another dream" },
  { t:  62,  text: "The monster's running wild inside of me" },
  { t:  66,  text: "I'm faded" },
  { t:  70,  text: "So lost, I'm faded" },
  { t:  74,  text: "So lost, I'm faded" },
  { t:  82,  text: "These shallow waters" },
  { t:  85,  text: "Never met what I needed" },
  { t:  89,  text: "I'm letting go" },
  { t:  92,  text: "A deeper dive" },
  { t:  95,  text: "Eternal silence of the sea" },
  { t:  99,  text: "I'm breathing" },
  { t: 102,  text: "Alive" },
  { t: 106,  text: "Where are you now?" },
  { t: 109,  text: "Was it all in my fantasy?" },
  { t: 113,  text: "Where are you now?" },
  { t: 116,  text: "Were you only imaginary?" },
  { t: 120,  text: "Under the sea" },
  { t: 123,  text: "Under the sea" },
  { t: 126,  text: "Where are you now?" },
  { t: 129,  text: "Another dream" },
  { t: 132,  text: "The monster's running wild inside of me" },
  { t: 136,  text: "I'm faded" },
  { t: 140,  text: "So lost, I'm faded" },
  { t: 144,  text: "So lost, I'm faded" },
  { t: 152,  text: "Where are you now?" },
  { t: 155,  text: "Another dream" },
  { t: 158,  text: "The monster's running wild inside of me" },
  { t: 162,  text: "I'm faded" },
  { t: 166,  text: "So lost, I'm faded" },
  { t: 170,  text: "So lost, I'm faded" },
  { t: 177,  text: "♪ ♪ ♪" },
];

// Build lyric DOM
const inner = document.getElementById('lyricsInner');
// Add padding lines top & bottom for centering
for (let i = 0; i < 2; i++) {
  const d = document.createElement('div');
  d.className = 'lyric-line';
  d.innerHTML = '&nbsp;';
  inner.appendChild(d);
}
lyrics.forEach((l, i) => {
  const d = document.createElement('div');
  d.className = 'lyric-line';
  d.textContent = l.text;
  d.id = 'l' + i;
  inner.appendChild(d);
});
for (let i = 0; i < 2; i++) {
  const d = document.createElement('div');
  d.className = 'lyric-line';
  d.innerHTML = '&nbsp;';
  inner.appendChild(d);
}

const lineH = 30; // approx px per line
let lastIdx = -1;

function updateLyrics(t) {
  let idx = lyrics.length - 1;
  for (let i = 0; i < lyrics.length; i++) {
    if (t < lyrics[i].t) { idx = i - 1; break; }
  }
  idx = Math.max(0, idx);
  if (idx === lastIdx) return;
  lastIdx = idx;

  // Update classes
  document.querySelectorAll('.lyric-line[id]').forEach((el, i) => {
    el.classList.remove('active', 'near');
    if (i === idx) el.classList.add('active');
    else if (Math.abs(i - idx) === 1) el.classList.add('near');
  });

  // Scroll: offset by 2 padding lines + active line, center it
  const box = document.querySelector('.lyrics-box');
  const boxH = box.clientHeight;
  // Each line ~30px, move so active line is in center
  const offset = (idx + 2) * lineH - (boxH / 2) + lineH / 2;
  inner.style.transform = `translateY(${-Math.max(0, offset)}px)`;
}

// ── Helpers ──────────────────────────────────────────────────
function fmt(s) {
  s = Math.max(0, s || 0);
  return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
}

function setPct(fill, thumb, pct) {
  fill.style.width = pct + '%';
  thumb.style.left = pct + '%';
}

audio.addEventListener('loadedmetadata', () => durEl.textContent = fmt(audio.duration));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  setPct(seekFill, seekThumb, pct);
  curEl.textContent = fmt(audio.currentTime);
  updateLyrics(audio.currentTime);
});

audio.addEventListener('ended', () => {
  iPlay.style.display = ''; iPause.style.display = 'none';
  status.textContent = 'Finished'; status.className = 'status';
  setPct(seekFill, seekThumb, 0);
  curEl.textContent = '0:00';
  lastIdx = -1;
  inner.style.transform = 'translateY(0)';
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    iPlay.style.display = 'none'; iPause.style.display = '';
    status.textContent = '▶ Now playing…'; status.className = 'status playing';
  } else {
    audio.pause();
    iPlay.style.display = ''; iPause.style.display = 'none';
    status.textContent = 'Paused'; status.className = 'status';
  }
}

// ── Generic drag for both seek & volume ──────────────────────
function makeDraggable(trackEl, onDrag) {
  function getX(e) {
    return (e.touches ? e.touches[0].clientX : e.clientX);
  }
  function calc(e) {
    const r = trackEl.getBoundingClientRect();
    return Math.max(0, Math.min(1, (getX(e) - r.left) / r.width));
  }
  let active = false;

  trackEl.addEventListener('mousedown', e => { active = true; onDrag(calc(e)); e.preventDefault(); });
  trackEl.addEventListener('touchstart', e => { active = true; onDrag(calc(e)); }, { passive: true });
  document.addEventListener('mousemove', e => { if (active) { onDrag(calc(e)); e.preventDefault(); } }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (active) { onDrag(calc(e)); e.preventDefault(); }
  }, { passive: false });
  document.addEventListener('mouseup',  () => active = false);
  document.addEventListener('touchend', () => active = false);
}

// Seek
makeDraggable(seekTrack, pct => {
  if (audio.duration) {
    audio.currentTime = pct * audio.duration;
    setPct(seekFill, seekThumb, pct * 100);
  }
});

// Volume
makeDraggable(volTrack, pct => {
  audio.volume = pct;
  setPct(volFill, volThumb, pct * 100);
});
</script>
</body>
</html>
